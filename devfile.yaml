schemaVersion: 2.2.0
metadata:
  name: kubedock-sample-devfile
commands:
  - id: clean-install
    exec:
      component: tools
      commandLine: 'mvn -X clean install -Dmaven.repo.local=/home/user/.m2/repository > maven_output.log'
      workingDir: ${PROJECT_SOURCE}
  - id: touch
    exec:
      component: tools
      commandLine: 'touch blubb'
      workingDir: ${PROJECT_SOURCE}
events:
  postStart:
    - touch
    - clean-install
components:
  - name: tools
    container:
      image: quay.io/devfile/universal-developer-image:latest
      memoryLimit: 8Gi
      memoryRequest: 1Gi
      cpuLimit: "2"
      cpuRequest: 200m
      volumeMounts:
        - name: m2
          path: /home/user/.m2
  - name: m2
    volume:
      size: 10G
